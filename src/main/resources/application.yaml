spring:
  application:
    name: ratelimit
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.demo.ratelimit: DEBUG
    com.demo.ratelimit.decisions: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
