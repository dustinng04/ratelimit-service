spring:
  application:
    name: ratelimit
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,info
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.demo.ratelimit: DEBUG
